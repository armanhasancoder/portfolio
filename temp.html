<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box; margin: 0; padding: 0;}
        body {display: flex;justify-content: center;align-items: center;height: 100vh; width: 100vw;}
        .cointainer {display: flex;height: 400px;width: 700px;border-radius: 10px;box-shadow: 0px 0px 10px grey;flex-direction: column;justify-content: center;}
        .card {margin: 10%;text-align: center;}
        a{align-self: center;text-decoration: none;color: black;display: flex;align-items: center;justify-content: center;height: 30px;width: 80px;border-radius: 10px;box-shadow: 0px 0px 5px black;transition: 0.3s;}
        a:hover{background-color: black;box-shadow: none;color: white;}
        @media (max-width: 768px) {.cointainer{height: 300px;width: 300px;}}
    </style>
</head>

<body>
    <main>
        <div class="cointainer">
            <div class="card">
                Portfolio is currently under development. New projects, CV, and updated social links will be added soon.
            </div>
            <a href="index.html">Go back</a>
        </div>
    </main>
</body>

</html>
